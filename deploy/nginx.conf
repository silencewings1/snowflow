# ============================================================
# snowflow.cloud nginx 配置
# 博客（Astro）+ todayfood（Vue）同域子路径部署
#
# 部署位置：/etc/nginx/sites-available/snowflow.cloud
# 启用：ln -s /etc/nginx/sites-available/snowflow.cloud /etc/nginx/sites-enabled/
# 测试：nginx -t
# 重载：nginx -s reload
# HTTPS：certbot --nginx -d snowflow.cloud -d www.snowflow.cloud
# ============================================================

# HTTP → HTTPS 重定向（certbot 会自动加，这里先预留）
server {
    listen 80;
    listen [::]:80;
    server_name snowflow.cloud www.snowflow.cloud;

    # certbot 验证用
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name snowflow.cloud www.snowflow.cloud;

    # —— SSL 证书（certbot 签发后自动填充，下面是占位）——
    # ssl_certificate /etc/letsencrypt/live/snowflow.cloud/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/snowflow.cloud/privkey.pem;

    # —— 安全头 ——
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # —— gzip ——
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ============================================================
    # todayfood API 反代（必须放在 todayfood 静态资源之前，最长前缀优先）
    # /projects/todayfood/api/fortune/today → FastAPI /api/fortune/today
    # ============================================================
    location /projects/todayfood/api/ {
        rewrite ^/projects/todayfood/api/(.*)$ /api/$1 break;
        proxy_pass http://127.0.0.1:9081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE/长连接支持（AI 生成可能耗时较长）
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # ============================================================
    # todayfood 前端（Vue SPA，子路径部署）
    # /projects/todayfood/ → /var/www/todayfood/
    # ============================================================
    location /projects/todayfood/ {
        alias /var/www/todayfood/;
        index index.html;
        try_files $uri $uri/ /projects/todayfood/index.html;
    }

    # ============================================================
    # 博客（Astro SSG 静态文件）
    # 根路径 + /projects/ + /posts/ + /archive/ + /about/ 等
    # ============================================================
    root /var/www/blog;
    index index.html;

    # 博客的 /projects 页面（Astro 生成的 /projects/index.html）
    # 不需要单独配 location，走根 root 即可
    # /projects/todayfood/ 已被上面的 location 拦截，不会冲突

    location / {
        try_files $uri $uri/ /404.html;
    }

    # Astro 静态资源缓存
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
