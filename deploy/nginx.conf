# snowflow.cloud: Astro site plus TodayFood and TripMate applications.
# Frontend dist paths are atomic symlinks managed by each deployment script.

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name snowflow.cloud www.snowflow.cloud;

    ssl_certificate /etc/letsencrypt/live/snowflow.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/snowflow.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # TodayFood API and backend-owned routes.
    location = /projects/todayfood/api {
        return 308 /projects/todayfood/api/;
    }

    location ^~ /projects/todayfood/api/ {
        rewrite ^/projects/todayfood/api/(.*)$ /api/$1 break;
        proxy_pass http://127.0.0.1:9081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    location = /projects/todayfood/admin {
        return 308 /projects/todayfood/admin/;
    }

    location = /projects/todayfood/admin/ {
        proxy_pass http://127.0.0.1:9081/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /projects/todayfood/admin/api/ {
        rewrite ^/projects/todayfood/admin/api/(.*)$ /admin/api/$1 break;
        proxy_pass http://127.0.0.1:9081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /projects/todayfood/admin/static/ {
        rewrite ^/projects/todayfood/admin/static/(.*)$ /admin/static/$1 break;
        proxy_pass http://127.0.0.1:9081;
        proxy_set_header Host $host;
    }

    location = /projects/todayfood/health {
        proxy_pass http://127.0.0.1:9081/health;
        proxy_set_header Host $host;
    }

    location = /projects/todayfood/docs {
        return 308 /projects/todayfood/docs/;
    }

    location ^~ /projects/todayfood/docs/ {
        rewrite ^/projects/todayfood/docs/(.*)$ /docs/$1 break;
        proxy_pass http://127.0.0.1:9081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # TodayFood Vue SPA.
    location = /projects/todayfood {
        return 308 /projects/todayfood/;
    }

    location = /projects/todayfood/index {
        return 308 /projects/todayfood/;
    }

    location = /projects/todayfood/index.html {
        default_type text/html;
        alias /home/ospacer/snowflow-site/todayfood/frontend/.deploy/current/index.html;
    }

    location ^~ /projects/todayfood/assets/ {
        alias /home/ospacer/snowflow-site/todayfood/frontend/.deploy/current/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ^~ /projects/todayfood/ {
        alias /home/ospacer/snowflow-site/todayfood/frontend/.deploy/current/;
        index index.html;
        try_files $uri $uri/ /projects/todayfood/index.html;
    }

    # TripMate API and React SPA.
    location = /projects/tripmate/api {
        return 308 /projects/tripmate/api/;
    }

    location ^~ /projects/tripmate/api/ {
        rewrite ^/projects/tripmate/api/(.*)$ /api/$1 break;
        proxy_pass http://127.0.0.1:9091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /projects/tripmate {
        return 308 /projects/tripmate/;
    }

    location = /projects/tripmate/index {
        return 308 /projects/tripmate/;
    }

    location = /projects/tripmate/index.html {
        default_type text/html;
        alias /home/ospacer/snowflow-site/tripmate/.deploy/current/index.html;
    }

    location ^~ /projects/tripmate/assets/ {
        alias /home/ospacer/snowflow-site/tripmate/.deploy/current/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ^~ /projects/tripmate/ {
        alias /home/ospacer/snowflow-site/tripmate/.deploy/current/;
        index index.html;
        try_files $uri $uri/ /projects/tripmate/index.html;
    }

    # Snowflow Astro output.
    root /home/ospacer/snowflow-site/snowflow/.deploy/current;
    index index.html;

    location ^~ /_astro/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ =404;
        error_page 404 /404.html;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name snowflow.cloud www.snowflow.cloud;
    return 308 https://$host$request_uri;
}
