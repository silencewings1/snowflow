# ============================================================
# snowflow.cloud nginx 配置（HTTP 初始版）
# 博客（Astro SSG）+ todayfood（Vue SPA + FastAPI）同域部署
#
# 部署文件全部位于 /home/ospacer/snowflow-site/，nginx 直接读 dist 目录。
#
# 安装：
#   sudo cp /home/ospacer/snowflow-site/snowflow/deploy/nginx.conf /etc/nginx/sites-available/snowflow.cloud
#   sudo ln -sf /etc/nginx/sites-available/snowflow.cloud /etc/nginx/sites-enabled/snowflow.cloud
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# 验证 HTTP 可访问后，签发 HTTPS：
#   sudo certbot --nginx -d snowflow.cloud -d www.snowflow.cloud
# certbot 会自动把本配置改写为 443 ssl + 80 跳转，无需手动改文件。
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name snowflow.cloud www.snowflow.cloud;

    # --- 安全头 ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- gzip ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ============================================================
    # todayfood API 反代
    # /projects/todayfood/api/*  ->  FastAPI /api/*
    # ============================================================
    location /projects/todayfood/api/ {
        rewrite ^/projects/todayfood/api/(.*)$ /api/$1 break;
        proxy_pass http://127.0.0.1:9081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE/长连接支持（AI 生成可能耗时较长）
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # ============================================================
    # todayfood 后台管理（admin 内嵌在后端）
    # /projects/todayfood/admin         ->  FastAPI /admin (HTML)
    # /projects/todayfood/admin/api/*   ->  FastAPI /admin/api/*
    # /projects/todayfood/admin/static/*->  FastAPI /admin/static/*
    # cookie 用默认 path=/，跨子路径可共享。
    # ============================================================
    location /projects/todayfood/admin/api/ {
        rewrite ^/projects/todayfood/admin/api/(.*)$ /admin/api/$1 break;
        proxy_pass http://127.0.0.1:9081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /projects/todayfood/admin/static/ {
        rewrite ^/projects/todayfood/admin/static/(.*)$ /admin/static/$1 break;
        proxy_pass http://127.0.0.1:9081;
        proxy_set_header Host $host;
    }
    location = /projects/todayfood/admin {
        return 301 /projects/todayfood/admin/;
    }
    location = /projects/todayfood/admin/ {
        proxy_pass http://127.0.0.1:9081/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # FastAPI 文档/health（挂子路径，便于排障）
    location = /projects/todayfood/health {
        proxy_pass http://127.0.0.1:9081/health;
        proxy_set_header Host $host;
    }
    location = /projects/todayfood/docs {
        return 301 /projects/todayfood/docs/;
    }
    location /projects/todayfood/docs/ {
        rewrite ^/projects/todayfood/docs/(.*)$ /docs/$1 break;
        proxy_pass http://127.0.0.1:9081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================================
    # todayfood 前端（Vue SPA，子路径部署）
    # /projects/todayfood/  ->  .../todayfood/frontend/dist/
    # 必须放在 API/admin 之后、博客 root 之前。
    # ^~ 修饰符：前缀匹配后不再进入正则 location，保证 todayfood 的
    # .js/.css/.svg 等静态资源由本 alias 提供，不会被下方博客的
    # 通配正则 location（~* \.(js|css|...)$）抢走。
    # ============================================================
    location = /projects/todayfood {
        default_type text/html;
        alias /home/ospacer/snowflow-site/todayfood/frontend/dist/index.html;
    }

    location = /projects/todayfood/ {
        return 301 /projects/todayfood;
    }

    location = /projects/todayfood/index {
        return 301 /projects/todayfood;
    }

    location = /projects/todayfood/index/ {
        return 301 /projects/todayfood;
    }

    location ^~ /projects/todayfood/ {
        alias /home/ospacer/snowflow-site/todayfood/frontend/dist/;
        index index.html;
        try_files $uri $uri/ /projects/todayfood/index.html;
    }

    # ============================================================
    # tripmate（React SPA + Express API）
    # ============================================================
    location = /projects/tripmate {
        return 301 /projects/tripmate/;
    }

    location /projects/tripmate/api/ {
        rewrite ^/projects/tripmate/api/(.*)$ /api/$1 break;
        proxy_pass http://127.0.0.1:9091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /projects/tripmate/other {
        return 404;
    }

    location ^~ /projects/tripmate/ {
        alias /home/ospacer/snowflow-site/tripmate/dist/;
        index index.html;
        try_files $uri $uri/ /projects/tripmate/index.html;
    }

    # ============================================================
    # 博客（Astro SSG 静态文件，根路径）
    # /projects/ 下除独立部署项目外都是 Astro 生成的项目页
    # ============================================================
    root /home/ospacer/snowflow-site/snowflow/dist;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
        error_page 404 /404.html;
    }

    # Astro 静态资源长缓存
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
